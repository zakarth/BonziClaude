name: Release BonziClaude

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            ws: gtk2
            artifact: BonziClaude-linux-x64
            binary: BonziClaude
          - os: windows-latest
            ws: win32
            artifact: BonziClaude-windows-x64
            binary: BonziClaude.exe
            arch: x86_64
          - os: windows-latest
            ws: win32
            artifact: BonziClaude-windows-x86
            binary: BonziClaude.exe
            arch: i386
          - os: macos-latest
            ws: cocoa
            artifact: BonziClaude-macos
            binary: BonziClaude

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Lazarus (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fpc lazarus

      - name: Install Lazarus (Windows/macOS)
        if: runner.os != 'Linux'
        uses: gcarreno/setup-lazarus@v3
        with:
          lazarus-version: stable
          architecture: ${{ matrix.arch || '' }}

      - name: Build
        run: lazbuild --ws=${{ matrix.ws }} BonziClaude.lpi

      - name: Bundle OpenSSL (Windows x64)
        if: matrix.artifact == 'BonziClaude-windows-x64'
        shell: pwsh
        run: |
          # Download OpenSSL 3 Light (redistributable, Apache 2.0)
          $url = "https://raw.githubusercontent.com/nicedoc/openssl-binaries/master/openssl-3/win64/libssl-3-x64.dll"
          $url2 = "https://raw.githubusercontent.com/nicedoc/openssl-binaries/master/openssl-3/win64/libcrypto-3-x64.dll"
          # Fallback: copy from Git for Windows if available
          $gitssl = "C:\Program Files\Git\mingw64\bin\libssl-3-x64.dll"
          $gitcrypto = "C:\Program Files\Git\mingw64\bin\libcrypto-3-x64.dll"
          if (Test-Path $gitssl) {
            Copy-Item $gitssl .
            Copy-Item $gitcrypto .
          }

      - name: Bundle OpenSSL (Windows x86)
        if: matrix.artifact == 'BonziClaude-windows-x86'
        shell: pwsh
        run: |
          $gitssl = "C:\Program Files\Git\mingw64\bin\libssl-3-x64.dll"
          $gitcrypto = "C:\Program Files\Git\mingw64\bin\libcrypto-3-x64.dll"
          # For x86, try the 32-bit variants
          $git32ssl = "C:\Program Files (x86)\Git\mingw32\bin\libssl-3.dll"
          $git32crypto = "C:\Program Files (x86)\Git\mingw32\bin\libcrypto-3.dll"
          if (Test-Path $git32ssl) {
            Copy-Item $git32ssl .
            Copy-Item $git32crypto .
          } elseif (Test-Path $gitssl) {
            # x86 build can use x64 OpenSSL DLLs on WoW64 in some cases
            # but better to note this in README
            Write-Host "No 32-bit OpenSSL found, x86 users will need to install OpenSSL"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.binary }}
            libssl*.dll
            libcrypto*.dll

  create-release:
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package releases
        run: |
          cd artifacts
          # Linux
          chmod +x BonziClaude-linux-x64/BonziClaude
          tar czf BonziClaude-linux-x64.tar.gz -C BonziClaude-linux-x64 BonziClaude
          # Windows x64 (with DLLs if present)
          cd BonziClaude-windows-x64 && zip ../BonziClaude-windows-x64.zip * && cd ..
          # Windows x86
          cd BonziClaude-windows-x86 && zip ../BonziClaude-windows-x86.zip * && cd ..
          # macOS
          chmod +x BonziClaude-macos/BonziClaude
          tar czf BonziClaude-macos.tar.gz -C BonziClaude-macos BonziClaude

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/BonziClaude-linux-x64.tar.gz
            artifacts/BonziClaude-windows-x64.zip
            artifacts/BonziClaude-windows-x86.zip
            artifacts/BonziClaude-macos.tar.gz
